name: dailypulse
description: "Daily Pulse - Track your daily moods and emotions"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  fl_chart: ^1.2.0
  intl: ^0.20.2
  uuid: ^4.5.3
  cupertino_icons: ^1.0.8
  easy_date_timeline: ^2.0.9
  provider: ^6.1.2
  connectivity_plus: ^7.0.0
  logger: ^2.7.0
  google_fonts: ^6.2.1
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  objectbox: ^5.3.2
  objectbox_flutter_libs: any
  path_provider: ^2.1.2
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  flutter_native_splash:
  flutter_launcher_icons: ^0.14.2
  riverpod_generator: any
  riverpod_lint: any
  objectbox_generator: any

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/general_ui/
    - assets/mindfull/
    - assets/navigation/
    - assets/super_ego/

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  image: assets/app_logo.png
  android_gravity: center
  ios_content_mode: scaleAspectFit
  android_12:
    color: "#FFFFFF"
    color_dark: "#FFFFFF"
    image: assets/app_logo.png
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_logo.png"


